<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – Safe Buy Realties</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />

  <style>
    :root {
      --primary: #4fffb0;
      --bg-dark: #0a0e17;
      --text-light: #e5e7eb;
      --glass-bg: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #030712, #0a0e17);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--text-light);
      padding: 1.5rem;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      background: var(--glass-bg);
      backdrop-filter: blur(14px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 2.4rem 2.1rem 2.2rem;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo-box {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo-badge {
      background: var(--primary);
      width: 60px; height: 60px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      font-size: 1.8rem;
      font-weight: 700;
      color: black;
      margin: 0 auto 1rem;
    }

    h2 {
      text-align: center;
      margin-bottom: 0.6rem;
      font-size: 1.8rem;
      font-weight: 600;
    }

    p.subtext {
      text-align: center;
      font-size: 0.95rem;
      opacity: 0.75;
      margin-bottom: 1.8rem;
    }

    .social-auth {
      display: grid;
      gap: 0.75rem;
      margin-bottom: 1.3rem;
    }

    .btn-social {
      width: 100%;
      padding: 0.8rem 1rem;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(15,23,42,0.9);
      color: var(--text-light);
      font-size: 0.95rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      cursor: pointer;
      transition: 0.25s;
    }

    .btn-social span.icon-circle {
      width: 22px;
      height: 22px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.5);
      display: grid;
      place-items: center;
      font-size: 0.8rem;
    }

    .btn-social:hover {
      transform: translateY(-2px);
      border-color: var(--primary);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 0.8rem 0 1.2rem;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      opacity: 0.7;
    }

    .divider span.line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(148,163,184,0.7), transparent);
    }

    .form-group {
      margin-bottom: 1.1rem;
    }

    label {
      display: block;
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 0.4rem;
    }

    input {
      width: 100%;
      padding: 0.9rem 1rem;
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: 0.3s;
    }

    input::placeholder {
      color: rgba(226,232,240,0.6);
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79,255,176,0.2);
    }

    .password-wrapper {
      position: relative;
    }

    .toggle-password {
      position: absolute;
      right: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.8rem;
      cursor: pointer;
      background: transparent;
      border: none;
      color: rgba(226,232,240,0.8);
      padding: 0;
    }

    .toggle-password:hover {
      color: var(--primary);
    }

    .btn-login {
      width: 100%;
      padding: 0.9rem;
      margin-top: 0.3rem;
      border-radius: 50px;
      background: var(--primary);
      border: none;
      color: black;
      font-weight: 700;
      font-size: 1.02rem;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-login:hover {
      background: #6fffd0;
      transform: translateY(-3px);
      box-shadow: 0 10px 26px rgba(0,0,0,0.4);
    }

    .extra-links {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.9rem;
      opacity: 0.9;
    }

    .extra-links a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }

    .extra-links a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .login-container {
        padding: 2rem 1.5rem 1.8rem;
      }
      h2 { font-size: 1.6rem; }
      p.subtext { font-size: 0.88rem; }
    }
  </style>
</head>

<body>

  <div class="login-container">
    
    <div class="logo-box">
      <div class="logo-badge">SB</div>
      <h2>Welcome Back</h2>
      <p class="subtext">Login to continue to Safe Buy Realties</p>
    </div>

    <!-- SOCIAL LOGIN (UI only – hook to backend later) -->
    <div class="social-auth">
      <button type="button" class="btn-social">
        <span class="icon-circle">G</span>
        <span>Continue with Google</span>
      </button>
      <button type="button" class="btn-social">
        <span class="icon-circle"></span>
        <span>Continue with Apple</span>
      </button>
    </div>

    <div class="divider">
      <span class="line"></span>
      <span>or continue with email</span>
      <span class="line"></span>
    </div>

    <form>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input id="email" type="email" placeholder="you@example.com" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-wrapper">
          <input id="password" type="password" placeholder="Enter your password" required />
          <button type="button" class="toggle-password" id="togglePassword">
            Show
          </button>
        </div>
      </div>

      <button type="submit" class="btn-login">Login</button>

      <div class="extra-links">
        <p><a href="forgot-password.html">Forgot Password?</a></p>
        <p>Don't have an account? <a href="register.html">Create one</a></p>
      </div>
    </form>

  </div>

  <script>
    // Simple password show/hide toggle
    const passwordInput = document.getElementById('password');
    const togglePassword = document.getElementById('togglePassword');

    togglePassword.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      togglePassword.textContent = isPassword ? 'Hide' : 'Show';
    });
  </script>

</body>
</html>
